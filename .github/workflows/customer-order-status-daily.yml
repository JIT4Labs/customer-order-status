name: Customer Order Status – Daily Report

on:
  schedule:
    # Runs every day at 6:30 AM UTC
    - cron: '30 6 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab at any time

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run customer order status report
        run: python3customer_order_status.py

      - name: Upload reports as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-reports-${{ github.run_id }}
          path: customer-order-status/
          retention-days: 7
